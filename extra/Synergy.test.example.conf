# Synergy test settings: example/template.
#
# Copy to the repo root as `Synergy.test.conf` (git-ignored). The app
# walks up from the binary's directory and loads the first
# Synergy.test.conf it finds, so a repo-root copy covers any build dir
# inside the tree and survives wipes of the app settings dir.
#
# When nothing is found above the binary (e.g. installed builds), it
# falls back to the location sibling to Synergy.conf:
#   ~/.config/Synergy/Synergy.test.conf            (Linux)
#   ~/Library/Synergy/Synergy.test.conf            (macOS)
#   %APPDATA%\Synergy\Synergy.test.conf            (Windows)
#
# This file is the only source of test settings; SYNERGY_TEST_* env vars
# are no longer read.

[test]

# Master switch. When true:
#   - The Test menu appears in the menu bar (fatal/critical-error triggers).
#   - The other values in this file are honored.
# Set false (or leave the file absent) to disable test mode entirely.
# enabled=true

# Force the license activation flow on. Useful for verifying activation
# behavior in development; left off by default so test mode (Test menu,
# URL overrides, etc.) can be on without forcing license prompts every
# launch.
# licensing=true

# Override the base URL for license API calls. The app appends the
# endpoint paths (/product/activate, /product/check) itself, so set this
# to the API root only. Default points at production. Use this to point
# at a local stack or staging environment during development.
# apiUrlBase=http://localhost:4200/synergy/api

# Pre-fill the activation dialog's serial key field. Hex-encoded payload
# matching the format the activation API expects. Test serial keys are
# distributed internally. Do not hardcode customer-visible keys here.
# serialKey=

# Override the machine identity used for offline activation. Offline
# activation codes are bound to this machine's hardware id, so on a real
# box the activation code never changes for a given serial key. Set this
# to any value to impersonate a different machine: change it (or the
# stored response) to confirm one machine's response code does not
# activate another, i.e. that an offline serial cannot be shared. Affects
# only offline activation, not the online activation machine signature.
# machineId=test-machine-1

# Time-travel testing. UNIX epoch seconds; if set, the GUI behaves as if
# the system clock were at this point in time when checking license
# expiry, grace periods, etc. Use to verify "expired", "expiring soon",
# and "in grace period" UI without waiting for real wall-clock time to
# elapse.
# startTime=1751324400

[features]

# Extra debug logging from the GUI. Logs every license-check decision,
# scope-switch step, settings reload. Useful when tracing a bug report.
# verbose=true

# Skip the periodic remote license re-check. Use when developing offline
# or when the API endpoint is intentionally unavailable, so the GUI
# doesn't enter the grace-period flow.
# skipRemoteCheck=true

# Treat expired licenses as still valid. Lets you start the core process
# with a known-expired test key without bypassing license enforcement
# entirely (useful for testing what features remain enabled vs blocked).
# allowExpiredLicenses=true
