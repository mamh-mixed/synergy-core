name: "Install dependencies"
description: "Install build dependencies for Synergy."

inputs:
  working-directory:
    description: "The working directory for the action."
    required: false
  qt-version:
    description: "The version of Qt to install on macOS and Windows."
    required: false
    default: "6.9.3"
  target-name:
    description: "The name of the build target (e.g. rocky-8-x86_64)."
    required: false
    default: ""

outputs:
  vcpkg-cmake-config:
    description: "Windows vcpkg output for cmake"
    value: ${{ steps.vcpkg.outputs.vcpkg-cmake-config }}

runs:
  using: "composite"

  steps:
    - name: Install dependencies
      if: ${{ runner.os == 'Linux' || runner.os == 'macOS' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ./scripts/install_deps.sh ${args}

    # HACK: Needed for GTest on Windows (installed bia Meson).
    - name: Install Meson deps (Windows)
      if: ${{ runner.os == 'Windows' }}
      shell: pwsh
      working-directory: ${{ inputs.working-directory }}
      run: python ./scripts/install_deps.py

    # Installs some Python deps (e.g. pip, etc) and the venv needed for the package step.
    - name: Setup Python env (Linux & macOS)
      if: ${{ runner.os == 'Linux' || runner.os == 'macOS' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ./scripts/install_deps.py

    # el8/el9 ship cmake 3.20 (below our 3.22 minimum); el8 also has no C++20
    # compiler. Put a newer cmake (and on el8 the gcc-toolset) on PATH for the build.
    - name: Setup RHEL toolchain
      if: ${{ startsWith(inputs.target-name, 'rocky') }}
      shell: bash
      run: |
        . /etc/os-release

        cmake_version=3.28.3
        curl -fsSL "https://github.com/Kitware/CMake/releases/download/v${cmake_version}/cmake-${cmake_version}-linux-x86_64.tar.gz" \
          | tar -xz -C /opt
        echo "/opt/cmake-${cmake_version}-linux-x86_64/bin" >> "$GITHUB_PATH"

        if [ "${VERSION_ID%%.*}" = "8" ]; then
          toolset=/opt/rh/gcc-toolset-13/root/usr
          echo "${toolset}/bin" >> "$GITHUB_PATH"
          echo "CC=${toolset}/bin/gcc" >> "$GITHUB_ENV"
          echo "CXX=${toolset}/bin/g++" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${toolset}/lib64" >> "$GITHUB_ENV"
        fi

    - name: Install Qt (macOS)
      if: ${{ runner.os == 'macOS' }}
      uses: jurplel/install-qt-action@v4
      env:
        AQT_CONFIG: ${{ github.action_path }}/aqt.ini
      with:
        dir: "/Users/runner"
        version: ${{ inputs.qt-version }}
        cache: true
        cache-key-prefix: macos-qt-${{ inputs.qt-version }}

    - name: Install Qt (Windows)
      if: ${{ runner.os == 'Windows' }}
      uses: jurplel/install-qt-action@v4
      env:
        AQT_CONFIG: ${{ github.action_path }}/aqt.ini
      with:
        dir: "C:"
        version: ${{ inputs.qt-version }}
        cache: true
        cache-key-prefix: windows-qt-${{ inputs.qt-version }}

    - name: Build and cache vcpkg
      if: ${{ runner.os == 'Windows' }}
      id: vcpkg
      uses: johnwason/vcpkg-action@v7
      with:
        manifest-dir: ${{ github.workspace }}/${{ inputs.working-directory }}
        triplet: x64-windows-release
        token: ${{ github.token }}

    # This effectively runs `vcvarsall.bat`, etc. It's not actually installing
    # VC++ as that's already pre-installed on the Windows runner.
    - name: Setup VC++ environment
      if: ${{ runner.os == 'Windows' }}
      uses: ilammy/msvc-dev-cmd@v1
